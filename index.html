<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Math - SWF Player</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle/ruffle.js"></script>
    <script>
        // Fallback: try official Ruffle CDN if mirror fails
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "hidden",
            backgroundColor: "#000000",
            letterbox: "on",
            warnOnUnsupportedContent: false
        };
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #0f3460;
        }
        header h1 { color: #e94560; font-size: 1.8rem; }
        header p { color: #aaa; margin-top: 5px; }
        .container {
            display: flex;
            min-height: calc(100vh - 90px);
        }
        .sidebar {
            width: 320px;
            background: #16213e;
            overflow-y: auto;
            padding: 15px;
            border-right: 2px solid #0f3460;
            flex-shrink: 0;
            max-height: calc(100vh - 90px);
        }
        .category {
            margin-bottom: 20px;
        }
        .category h3 {
            color: #e94560;
            padding: 8px 12px;
            background: #0f3460;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }
        .category h3:hover { background: #1a4a8a; }
        .category h3::before {
            content: '\25B6';
            display: inline-block;
            margin-right: 8px;
            transition: transform 0.2s;
            font-size: 0.7rem;
        }
        .category.open h3::before {
            transform: rotate(90deg);
        }
        .file-list {
            display: none;
            padding: 5px 0;
        }
        .category.open .file-list { display: block; }
        .file-list button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: #ccc;
            padding: 6px 12px 6px 28px;
            cursor: pointer;
            font-size: 0.82rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .file-list button:hover { background: #0f3460; color: #fff; }
        .file-list button.active { background: #e94560; color: #fff; }
        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #player-container {
            width: 800px;
            height: 600px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #player-container ruffle-embed,
        #player-container ruffle-player {
            width: 100%;
            height: 100%;
        }
        #player-info {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #555;
            font-size: 1.2rem;
        }
        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e94560;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Destination Math: Counting from 1 to 5</h1>
        <p>Session 1 - SWF Player (powered by Ruffle)</p>
    </header>
    <div class="container">
        <div class="sidebar" id="sidebar"></div>
        <div class="player-area">
            <div id="player-container">
                <div class="placeholder">Select a SWF file from the sidebar to play</div>
                <div id="loading">Loading SWF...</div>
            </div>
            <div id="player-info"></div>
        </div>
    </div>

    <script>
        const swfFiles = {
            "Main": [
                "kControl.swf",
                "k-3_Menu.swf"
            ],
            "eaa - Screen 1 (Counting 1-3)": [
                "eaa/eaa_scr_1_kp_00.swf",
                "eaa/eaa_scr_1_kp_01.swf",
                "eaa/eaa_scr_1_kp_02.swf",
                "eaa/eaa_scr_1_kp_03.swf",
                "eaa/eaa_scr_1_kp_04.swf",
                "eaa/eaa_scr_1_kp_05_00.swf",
                "eaa/eaa_scr_1_kp_05_01.swf",
                "eaa/eaa_scr_1_kp_06.swf",
                "eaa/eaa_scr_1_kp_06_AM1_Q1.swf",
                "eaa/eaa_scr_1_kp_06_NoAct_Q1.swf",
                "eaa/eaa_scr_1_kp_06_Right_Q1.swf",
                "eaa/eaa_scr_1_kp_07.swf",
                "eaa/eaa_scr_1_kp_08.swf",
                "eaa/eaa_scr_1_kp_08_AM1_Q1.swf",
                "eaa/eaa_scr_1_kp_08_AM2_Q1.swf",
                "eaa/eaa_scr_1_kp_08_AM3_Q1.swf",
                "eaa/eaa_scr_1_kp_08_AM4_Q1.swf",
                "eaa/eaa_scr_1_kp_08_DefAM_Q1.swf",
                "eaa/eaa_scr_1_kp_08_NoAct_Q1.swf",
                "eaa/eaa_scr_1_kp_08_Right_Q1.swf"
            ],
            "eaa - Screen 2 (Counting 4-5)": [
                "eaa/eaa_scr_2_kp_00.swf",
                "eaa/eaa_scr_2_kp_01.swf",
                "eaa/eaa_scr_2_kp_01_AM1_Q1.swf",
                "eaa/eaa_scr_2_kp_01_AM2_Q1.swf",
                "eaa/eaa_scr_2_kp_01_AM3_Q1.swf",
                "eaa/eaa_scr_2_kp_01_AM4_Q1.swf",
                "eaa/eaa_scr_2_kp_01_NoAct_Q1.swf",
                "eaa/eaa_scr_2_kp_02.swf",
                "eaa/eaa_scr_2_kp_02_AM1_Q1.swf",
                "eaa/eaa_scr_2_kp_02_NoAct_Q1.swf",
                "eaa/eaa_scr_2_kp_03_00.swf",
                "eaa/eaa_scr_2_kp_03_01.swf",
                "eaa/eaa_scr_2_kp_04.swf",
                "eaa/eaa_scr_2_kp_04_AM1_Q1.swf",
                "eaa/eaa_scr_2_kp_04_NoAct_Q1.swf",
                "eaa/eaa_scr_2_kp_05.swf",
                "eaa/eaa_scr_2_kp_06_00.swf",
                "eaa/eaa_scr_2_kp_06_01.swf",
                "eaa/eaa_scr_2_kp_06_01_DefAM_Q1.swf",
                "eaa/eaa_scr_2_kp_06_01_NoAct_Q1.swf",
                "eaa/eaa_scr_2_kp_06_01_Right_Q1.swf",
                "eaa/eaa_scr_2_kp_06_02.swf"
            ],
            "eag - Workout (Quiz)": [
                "eag/eag_qn_kp_00.swf",
                "eag/eag_qn_kp_01.swf",
                "eag/eag_qn_kp_01_AM1_Q1.swf",
                "eag/eag_qn_kp_01_AM2_Q1.swf",
                "eag/eag_qn_kp_01_DefAM_Q1.swf",
                "eag/eag_qn_kp_01_NoAct_Q1.swf",
                "eag/eag_qn_kp_01_Wrong_Q1.swf"
            ],
            "eag - Workout (Summary)": [
                "eag/eag_sm_kp_00.swf",
                "eag/eag_sm_kp_01.swf",
                "eag/eag_sm_kp_02_00.swf",
                "eag/eag_sm_kp_02_01.swf",
                "eag/eag_sm_kp_03.swf"
            ],
            "eau - Practice (Lesson 1)": [
                "eau/eau_lo_1_kp_00.swf",
                "eau/eau_lo_1_kp_00_back.swf",
                "eau/eau_lo_1_kp_01.swf",
                "eau/eau_lo_1_kp_02.swf"
            ],
            "eau - Practice (Lesson 2)": [
                "eau/eau_lo_2_kp_00.swf",
                "eau/eau_lo_2_kp_01.swf",
                "eau/eau_lo_2_kp_02.swf"
            ]
        };

        const sidebar = document.getElementById('sidebar');
        const playerContainer = document.getElementById('player-container');
        const playerInfo = document.getElementById('player-info');
        const loading = document.getElementById('loading');

        // Build sidebar
        for (const [category, files] of Object.entries(swfFiles)) {
            const div = document.createElement('div');
            div.className = 'category';
            const h3 = document.createElement('h3');
            h3.textContent = category;
            h3.addEventListener('click', () => div.classList.toggle('open'));
            div.appendChild(h3);

            const list = document.createElement('div');
            list.className = 'file-list';
            for (const file of files) {
                const btn = document.createElement('button');
                btn.textContent = file.split('/').pop();
                btn.addEventListener('click', () => loadSWF(file, btn));
                list.appendChild(btn);
            }
            div.appendChild(list);
            sidebar.appendChild(div);
        }

        // Open first category by default
        sidebar.querySelector('.category').classList.add('open');

        async function loadSWF(path, btn) {
            // Update active button
            document.querySelectorAll('.file-list button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Clear player
            playerContainer.innerHTML = '';

            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            player.style.width = '100%';
            player.style.height = '100%';
            playerContainer.appendChild(player);

            try {
                await player.load('session1/' + path);
                playerInfo.textContent = 'Playing: ' + path;
            } catch (e) {
                // Fallback: use object/embed tag
                playerContainer.innerHTML =
                    '<object type="application/x-shockwave-flash" data="session1/' + path + '" width="800" height="600">' +
                    '<param name="movie" value="session1/' + path + '">' +
                    '<param name="quality" value="high">' +
                    '<p style="color:#e94560;text-align:center;padding-top:250px;">Could not load SWF: ' + e.message + '</p>' +
                    '</object>';
                playerInfo.textContent = 'Error loading: ' + path + ' - ' + e.message;
            }
        }
    </script>
</body>
</html>
