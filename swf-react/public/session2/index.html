<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session 2 - Numbers 11-20</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas-wrap {
    width: 590px;
    height: 410px;
    position: relative;
    transform: scale(1.4);
    transform-origin: center center;
  }
  #main-canvas {
    display: block;
    width: 590px;
    height: 410px;
  }
  #frame-counter {
    position: absolute;
    bottom: 4px;
    right: 8px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    z-index: 5;
    pointer-events: none;
    text-shadow: 0 0 4px #000;
  }
  #s2-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.35);
    z-index: 10;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
  }
  #s2-loading.hidden { display: none; }

  /* ── Con-so button ──
     Canvas space: 590×410. Target center: x=431, y=339. Button: 52×38.
     left = 431 − 26 = 405, top = 339 − 19 = 301  */
  #cons0-btn {
    position: absolute;
    left: 405px;
    top: 325px;
    width: 52px;
    height: 38px;
    cursor: pointer;
    z-index: 15;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    background: none;
    border: none;
    padding: 0;
  }
  #cons0-btn.visible {
    opacity: 1;
    pointer-events: all;
  }
  #cons0-btn img {
    width: 100%;
    height: 100%;
    display: block;
  }
  #cons0-btn:hover {
    transform: scale(1.12);
    filter: drop-shadow(0 0 8px rgba(255, 200, 100, 0.8));
  }
  #cons0-btn:active {
    transform: scale(0.95);
  }

  /* ── "Click me!" hint ── */
  #cons0-hint {
    position: absolute;
    left: 397px;
    top: 345px;
    font-family: 'Fredoka', cursive, sans-serif;
    font-size: 11px;
    color: #ffe0a0;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    white-space: nowrap;
  }
  #cons0-hint.visible {
    opacity: 1;
    animation: hintPulse 1.2s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { transform: translateY(0); opacity: 1; }
    50% { transform: translateY(-3px); opacity: 0.7; }
  }

  /* ── Segment 3: con sên (vùng bấm trên canvas, chỉnh left/top nếu cần) ── */
  #seg3-shen-btn {
    position: absolute;
    left: 80px;
    top: 100px;
    width: 125px;
    height: 200px;
    cursor: pointer;
    z-index: 16;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    background: none;
    border: none;
    padding: 0;
    border-radius: 12px;
  }
  #seg3-shen-btn.visible {
    opacity: 0;
    pointer-events: all;
  }
  #seg3-shen-btn:focus-visible {
    outline: 2px solid rgba(255, 220, 120, 0.9);
    outline-offset: 2px;
  }
  #seg3-shen-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }
  #seg3-shen-hint {
    position: absolute;
    left: 20px;
    top: 300px;
    font-family: system-ui, sans-serif;
    font-size: 11px;
    color: #ffe0a0;
    z-index: 16;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    max-width: 200px;
    line-height: 1.3;
    display: none;
  }
  #seg3-shen-hint.visible {
    opacity: 0;
  }
</style>
</head>
<body>
<div id="canvas-wrap">
  <div id="s2-loading">Đang tải 865 khung hình…</div>

  <canvas id="main-canvas" width="590" height="410"></canvas>

  <!-- Con-so clickable button (top-right) -->
  <button id="cons0-btn" title="Nhấn để tiếp tục">
    <img src="shapes/con-so.svg" alt="Con sò" />
  </button>
  <div id="cons0-hint"></div>

  <button type="button" id="seg3-shen-btn" title="Nhấn con sên" aria-label="Con sên">
    <img src="shapes/con-sen.svg" alt="" />
  </button>
  <div id="seg3-shen-hint"></div>
</div>

<script>
const FRAMES_PATH    = 'frames/';
const FRAMES_SEG3_PATH = 'frames/segment3/frames/';
const SOUNDS_PATH    = 'sounds/';
const TOTAL_FRAMES   = 865;   // 544 + 321 (segment3)
const FPS            = 24;
const PAUSE_AT       = 242;   // dừng auto ở frame này, chờ bấm con-sò
const RESUME_AT      = 244;   // tiếp tục từ frame này khi bấm con-sò
const SEG2_END       = 543;   // kết thúc segment 2
const SEG3_START     = 545;   // bắt đầu segment 3 (frames/segment3/frames/1.svg)
const SEG3_END       = 865;   // kết thúc segment 3 (virtual frame 865 = real frame 321)
const FINAL_FRAME    = 865;   // frame cuối → gọi complete
const SEG1_AUDIO_END  = 247;  // frame cuối audio -1_10-247.mp3
const SEG2_AUDIO_START = 271; // frame bắt đầu audio -1_271-544.mp3
const CONSO_AUDIO    = SOUNDS_PATH + '-1_10-247.mp3';
const SEG2_AUDIO     = SOUNDS_PATH + '-1_271-544.mp3';
const SEG3_AUDIO     = SOUNDS_PATH + '-1_10-321.mp3';
/** Segment 3: intro audio 0→5.4s, frame real 1..68 (virtual 545..612) map tuyến tính theo thời gian;
    hết intro dừng chờ click; click đầu bắt đầu từ real 69 (virtual 613) */
const SEG3_INTRO_END_SEC       = 4.5;
const SEG3_INTRO_REAL_FRAMES   = 68; // real 1..68 trong intro
const SEG3_INTRO_END_VIRTUAL   = SEG3_START + SEG3_INTRO_REAL_FRAMES - 1; // 612

/** Cửa sổ thời gian audio (giây) cho click thứ ci (0-based), mỗi click tăng 1.2s */
function seg3ClickAudioWindow(ci) {
  const wStart = SEG3_INTRO_END_SEC + ci * 1.2;
  const [fromReal, toReal] = SEG3_CLICKS[ci];
  const wEnd = wStart + 1.2;
  return { wStart, wEnd, fromReal, toReal };
}
const SEG3_CLICKS = [
  [69,   81 ],
  [82,   92 ],
  [93,   108],
  [109,  121],
  [122,  135],
  [136,  149],
  [150,  165],
  [166,  180],
  [181,  195],
  [196,  212],
  [213,  321],
];

/** Vị trí đặt shapes/1.svg … 11.svg lên nền anh-dung-10s (tọa độ canvas 590×410, căn giữa ảnh) */
const EGG_OVERLAY_SPOTS = [
  { x: 218, y: 88 },
  { x: 215, y: 126 },
  { x: 215, y: 164 },
  { x: 216, y: 201 },
  { x: 215, y: 239 },
  { x: 256, y: 86 },
  { x: 255, y: 125 },
  { x: 255, y: 165 },
  { x: 255, y: 201 },
  { x: 256, y: 238 },
  { x: 331, y: 239 },
];
const EGG_OVERLAY_MAX = 36;

const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');

/* ── Audio ── */
const seg1Audio = new Audio(CONSO_AUDIO);
seg1Audio.preload = 'auto';

const seg2Audio = new Audio(SEG2_AUDIO);
seg2Audio.preload = 'auto';

const seg3Audio = new Audio(SEG3_AUDIO);
seg3Audio.preload = 'auto';

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = 590 * dpr;
  canvas.height = 410 * dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality  = 'high';
}

setupCanvas();

function cleanSvgText(svgText) {
  return svgText
    .replace(/<rect[^>]*fill="[^"]*"[^>]*>/gi, '')
    .replace(/background:[^;"']+/gi, 'background:none');
}

/* ── UI helpers ── */
const $cons0Btn  = document.getElementById('cons0-btn');
const $cons0Hint = document.getElementById('cons0-hint');

function showCons0() {
  $cons0Btn.classList.add('visible');
  $cons0Hint.classList.add('visible');
}
function hideCons0() {
  $cons0Btn.classList.remove('visible');
  $cons0Hint.classList.remove('visible');
}

const $seg3ShenBtn  = document.getElementById('seg3-shen-btn');
const $seg3ShenHint = document.getElementById('seg3-shen-hint');

function showSeg3Shen(remaining) {
  $seg3ShenBtn.classList.add('visible');
  $seg3ShenHint.classList.add('visible');
  $seg3ShenHint.textContent = remaining + ' lần';
}
function hideSeg3Shen() {
  $seg3ShenBtn.classList.remove('visible');
  $seg3ShenHint.classList.remove('visible');
}
function setCounter(n) {
  const el = document.getElementById('frame-num');
  if (el) el.textContent = String(n);
}

/* ── Player ── */
const player = {
  currentFrame: 0,
  isPlaying: false,
  _rafId: null,
  _anhDungImg: null,
  _anhDungShown: false,
  _eggOverlayImgs: [],
  _eggOverlayStep: 0,
  _eggOverlayTimer: null,
  _eggOverlayDone: false,

  /* phase:
       'loading'    – đang tải
       'seg1'       – auto chạy segment 1 (1→PAUSE_AT)
       'waiting'    – chờ bấm con-sò lần 1 (tại PAUSE_AT)
       'seg2'       – auto chạy segment 2 (RESUME_AT→SEG2_END)
       'seg3intro'  – seg3: intro 0→4.5s (frame 545→612) rồi dừng chờ bấm con sên
       'seg3shen'   – seg3: đang chờ bấm con sên (có _seg3ShenClicks left)
       'seg3rest'   – seg3: phát phần còn lại sau click 11 (frames 321→865)
       'complete'    – complete
  */
  phase: 'loading',
  _seg3ShenClicks: 0,    // số lần bấm con sên còn lại
  _seg3ClickIdx: 0,      // index của click hiện tại (0-based)
  _seg3ShenRAF: null,    // RAF id cho animation mỗi click

  /** Sparse cache — only frames that have been loaded */
  _cache: {},
  /** In-flight load promises so we don't double-fetch the same frame */
  _loading: {},

  /** Load one frame (cached / deduped) and store in _cache */
  _loadOne(i) {
    if (this._cache[i]) return Promise.resolve(this._cache[i]);
    if (this._loading[i]) return this._loading[i];
    const p = new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        this._cache[i] = img;
        resolve(img);
      };
      img.onerror = () => {
        this._cache[i] = null;
        resolve(null);
      };
      // Segment3 frames live in a subfolder: frames/segment3/frames/{1..321}.svg
      const src = (i >= SEG3_START)
        ? FRAMES_SEG3_PATH + (i - SEG3_START + 1) + '.svg'
        : FRAMES_PATH + i + '.svg';
      fetch(src)
        .then((r) => (r.ok ? r.text() : Promise.reject()))
        .then((svgText) => {
          const blob = new Blob([cleanSvgText(svgText)], { type: 'image/svg+xml' });
          img.src = URL.createObjectURL(blob);
        })
        .catch(() => resolve(null));
    });
    this._loading[i] = p;
    return p;
  },

  /** Load a range in the background, fire-and-forget */
  async _preloadRange(from, to) {
    const limit = 16;
    for (let i = from; i <= to; i += limit) {
      const batch = [];
      for (let j = i; j < i + limit && j <= to; j++) batch.push(this._loadOne(j));
      await Promise.all(batch);
    }
  },

  /** Called by player before drawing a frame — ensures frame is ready.
   *  Returns the Image (or null).  */
  async _ensureFrame(n) {
    if (!this._cache[n]) await this._loadOne(n);
    return this._cache[n] || null;
  },

  async loadFrames() {
    const loadingEl = document.getElementById('s2-loading');
    if (loadingEl) {
      loadingEl.classList.remove('hidden');
      loadingEl.textContent = 'Đang tải…';
    }

    // Load frame 1 first — as soon as it's ready, hide overlay and start playing
    await this._loadOne(1);
    this.drawFrame(1);

    // Preload ảnh tĩnh freeze, chờ xong trước khi bắt đầu
    this._anhDungImg = new Image();
    this._anhDungImg.src = 'shapes/anh-dung-10s.svg';
    await new Promise(r => { this._anhDungImg.onload = r; this._anhDungImg.onerror = r; });

    this._eggOverlayImgs = [];
    for (let i = 1; i <= EGG_OVERLAY_SPOTS.length; i++) {
      const im = new Image();
      im.src = 'shapes/' + i + '.svg';
      this._eggOverlayImgs.push(im);
    }
    await Promise.all(
      this._eggOverlayImgs.map(
        (im) => new Promise((r) => { im.onload = r; im.onerror = r; })
      )
    );

    if (loadingEl) loadingEl.classList.add('hidden');
    try {
      parent.postMessage({ action: 'framesLoaded' }, '*');
    } catch (e) {}

    // Continue pre-loading ahead in background (fire-and-forget)
    this._preloadRange(2, Math.min(TOTAL_FRAMES, 64));

    requestAnimationFrame(() => {
      requestAnimationFrame(() => this._startSeg1());
    });
  },

  _startSeg1() {
    this.phase = 'seg1';
    seg1Audio.currentTime = 0;
    seg1Audio.play().catch(() => {});
    this._anhDungShown = false;
    this._doPlay(1, PAUSE_AT);
  },

  _doPlay(from, to) {
    if (this.isPlaying) return;
    this.isPlaying = true;
    try { parent.postMessage({ action: 'playing' }, '*'); } catch (e) {}

    let frozenUntilAudioTime = null;

    // Khi resume từ pause, khôi phục overlay state đã lưu
    if (this.phase === 'seg2' && this._seg2PausedOverlayStep !== undefined) {
      this._eggOverlayStep = this._seg2PausedOverlayStep;
      this._anhDungShown = true;
      this._seg2PausedOverlayStep = undefined;
      this._seg2PausedAt = undefined;
      this._drawAnhDung();
      if (this._eggOverlayStep >= EGG_OVERLAY_SPOTS.length) {
        this._eggOverlayDone = true;
      }
      // Tính lại từ audio time đã lưu
      const savedT = this._seg2PausedAt ?? 0;
      if (savedT >= 10) frozenUntilAudioTime = savedT;
      this._seg2PausedAt = undefined;
    }

    const tick = () => {
      if (!this.isPlaying) return;

      if (this.phase === 'seg1') {
        const nxt = this.currentFrame + 1;
        if (nxt > to) { this._onReachEnd(to); return; }
        this.drawFrame(nxt);

      } else if (this.phase === 'seg2') {
        const t = seg2Audio.currentTime;

        if (this._eggOverlayDone) {
          if (seg2Audio.ended) {
            this._clearEggOverlayTimer();
            this._onReachEnd(to);
            return;
          }
          this._rafId = requestAnimationFrame(tick);
          return;

        } else if (frozenUntilAudioTime !== null) {
          if (!this._eggOverlayTimer && this._eggOverlayStep < EGG_OVERLAY_SPOTS.length) {
            if (this._eggOverlayStep === 0) this._eggOverlayStep = 1;
            this._drawAnhDung();
            this._eggOverlayTimer = setInterval(() => {
              if (this._eggOverlayStep < EGG_OVERLAY_SPOTS.length) {
                this._eggOverlayStep++;
                this._drawAnhDung();
              } else {
                this._eggOverlayDone = true;
                this._clearEggOverlayTimer();
              }
            }, 1000);
          }
          if (seg2Audio.ended) {
            this._clearEggOverlayTimer();
            frozenUntilAudioTime = null;
            this._onReachEnd(to);
            return;
          }
        } else if (t >= 10) {
          frozenUntilAudioTime = t;
          this._anhDungShown = true;
          this._drawAnhDung();
          if (seg2Audio.ended) {
            this._clearEggOverlayTimer();
            frozenUntilAudioTime = null;
            this._onReachEnd(to);
            return;
          }
        } else {
          // Đừng vẽ frame -1 (freeze) khi audio đang chạy — bỏ qua tạm thời
          const frame = Math.round(RESUME_AT + t * FPS);
          if (frame >= RESUME_AT) {
            const clamped = Math.max(RESUME_AT, Math.min(frame, to));
            if (clamped !== this.currentFrame) this.drawFrame(clamped);
          }
          if (frame >= to) { this._onReachEnd(to); return; }
        }

      } else if (this.phase === 'seg3intro' || this.phase === 'seg3shen' || this.phase === 'seg3rest') {
        if (this.phase === 'seg3intro') {
          const t = seg3Audio.currentTime;
          // Dừng intro khi audio chạy đến 4 giây → frame 612, HUD 4.00s
          if (t >= SEG3_INTRO_END_SEC || seg3Audio.ended) {
            seg3Audio.pause();
            seg3Audio.currentTime = SEG3_INTRO_END_SEC;
            this.isPlaying = false;
            if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
            this.phase = 'seg3shen';
            this._seg3ClickIdx = 0;
            this._seg3ShenClicks = SEG3_CLICKS.length;
            showSeg3Shen(this._seg3ShenClicks);
            this.drawFrame(SEG3_INTRO_END_VIRTUAL);
            try { parent.postMessage({ action: 'paused' }, '*'); } catch (e) {}
            return;
          }
          const idx = Math.min(
            SEG3_INTRO_REAL_FRAMES - 1,
            Math.floor((t / SEG3_INTRO_END_SEC) * SEG3_INTRO_REAL_FRAMES)
          );
          const vFrame = SEG3_START + idx;
          if (vFrame !== this.currentFrame) this.drawFrame(vFrame);

        } else if (this.phase === 'seg3shen') {
          // Đang chờ bấm — audio đã pause, RAF loop không làm gì

        } else if (this.phase === 'seg3rest') {
          if (seg3Audio.ended) {
            this._onReachEnd(to);
            return;
          }
          const t = seg3Audio.currentTime;
          const frame = Math.round(SEG3_START + t * FPS);
          const clamped = Math.max(SEG3_START, Math.min(frame, SEG3_END));
          if (clamped !== this.currentFrame) this.drawFrame(clamped);
          if (frame >= to) { this._onReachEnd(to); return; }
        }
      }

      this._rafId = requestAnimationFrame(tick);
    };

    this._rafId = requestAnimationFrame(tick);
  },

  _clearEggOverlayTimer() {
    if (this._eggOverlayTimer != null) {
      clearInterval(this._eggOverlayTimer);
      this._eggOverlayTimer = null;
    }
  },

  _drawEggAt(img, spot) {
    if (!img || !img.complete || !img.naturalWidth) return;
    let w = img.naturalWidth;
    let h = img.naturalHeight;
    if (w > EGG_OVERLAY_MAX) {
      h = (h * EGG_OVERLAY_MAX) / w;
      w = EGG_OVERLAY_MAX;
    }
    ctx.save();
    ctx.drawImage(img, spot.x - w / 2, spot.y - h / 2, w, h);
    ctx.restore();
  },

  _drawAnhDung() {
    this.currentFrame = -1;
    ctx.clearRect(0, 0, 590, 410);
    if (this._anhDungImg && this._anhDungImg.complete && this._anhDungImg.naturalWidth > 0) {
      ctx.drawImage(this._anhDungImg, 0, 0, 590, 410);
    }
    const n = Math.min(this._eggOverlayStep, EGG_OVERLAY_SPOTS.length);
    for (let i = 0; i < n; i++) {
      this._drawEggAt(this._eggOverlayImgs[i], EGG_OVERLAY_SPOTS[i]);
    }
    setCounter('*');
  },

  async drawFrame(n) {
    const target = n;
    this.currentFrame = target;
    const img = await this._ensureFrame(target);
    if (this.currentFrame !== target) return;
    if (!img) return;
    ctx.clearRect(0, 0, 590, 410);
    ctx.drawImage(img, 0, 0, 590, 410);
    setCounter(n);

    if (this.phase === 'seg2' || this.phase.startsWith('seg3')) {
      const seg3Limit = this.phase === 'seg3rest' ? SEG3_END : (SEG3_START + 321);
      this._preloadRange(n + 1, Math.min(n + 48, this.phase === 'seg2' ? TOTAL_FRAMES : seg3Limit));
    }
  },

  stop() {
    this.isPlaying = false;
    this._clearEggOverlayTimer();
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    if (this._seg3ShenRAF) { cancelAnimationFrame(this._seg3ShenRAF); this._seg3ShenRAF = null; }
    seg1Audio.pause();
    seg2Audio.pause();
    seg3Audio.pause();
    // Lưu trạng thái seg2 để resume đúng vị trí
    if (this.phase === 'seg2') {
      this._seg2PausedAt = seg2Audio.currentTime;
      this._seg2PausedOverlayStep = this._eggOverlayStep;
      this._eggOverlayDone = false;
    }
    try { parent.postMessage({ action: 'paused' }, '*'); } catch (e) {}
  },

  pause() { this.stop(); },

  restart() {
    this.stop();
    this.phase = 'loading';
    hideCons0();
    hideSeg3Shen();
    this.currentFrame = 0;
    this._cache = {};
    this._loading = {};
    this._anhDungShown = false;
    this._eggOverlayStep = 0;
    this._eggOverlayDone = false;
    this._seg2PausedAt = undefined;
    this._seg2PausedOverlayStep = undefined;
    this._seg3ShenClicks = 0;
    this._seg3ClickIdx = 0;
    if (this._seg3ShenRAF) { cancelAnimationFrame(this._seg3ShenRAF); this._seg3ShenRAF = null; }
    seg3Audio.pause();
    seg3Audio.currentTime = 0;
    this.drawFrame(1);
    requestAnimationFrame(() => { requestAnimationFrame(() => this._startSeg1()); });
  },

  goToFrame(n) {
    this.stop();
    this.drawFrame(Math.max(1, Math.min(n, TOTAL_FRAMES)));
  },

  _onReachEnd(to) {
    this.isPlaying = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }

    if (to === PAUSE_AT && this.phase === 'seg1') {
      this.phase = 'waiting';
      showCons0();
      try { parent.postMessage({ action: 'paused' }, '*'); } catch (e) {}
      return;
    }

    if (to === SEG2_END && this.phase === 'seg2') {
      // Kết thúc segment 2 → tự động bắt đầu segment 3
      this._clearEggOverlayTimer();
      this._eggOverlayDone = false;
      hideCons0();
      this.phase = 'seg3intro';
      seg2Audio.pause();
      seg3Audio.currentTime = 0;
      seg3Audio.play().catch(() => {});
      this._doPlay(SEG3_START, SEG3_END);
      return;
    }

    if (to === SEG3_END && this.phase === 'seg3rest') {
      this.phase = 'complete';
      this._clearEggOverlayTimer();
      this._eggOverlayDone = false;
      hideCons0();
      this.drawFrame(SEG3_END);
      try { parent.postMessage({ action: 'sessionComplete', session: 2 }, '*'); parent.postMessage({ action: 'enableNext' }, '*'); } catch (e) {}
      return;
    }
  },

  resumeFromCons0() {
    if (this.phase !== 'waiting') return;
    hideCons0();
    this.phase = 'seg2';
    this._clearEggOverlayTimer();
    this._eggOverlayStep = 0;
    this._eggOverlayDone = false;
    this._anhDungShown = false;
    this._seg2PausedAt = undefined;
    this._seg2PausedOverlayStep = undefined;
    seg1Audio.pause();
    seg2Audio.currentTime = 0;
    seg2Audio.play().catch(() => {});
    this._doPlay(RESUME_AT, SEG2_END);
  },
};

/* ── Con-sò click ── */
$cons0Btn.addEventListener('click', () => {
  player.resumeFromCons0();
});

/* ── Segment 3: con sên click — mỗi click = đúng khoảng frame cố định ── */
function seg3ShenOnClick() {
  if (player.phase !== 'seg3shen') return;
  if (player._seg3ShenClicks <= 0) return;
  if (player._seg3ClickIdx >= SEG3_CLICKS.length) return;

  player._seg3ShenClicks--;
  showSeg3Shen(Math.max(0, player._seg3ShenClicks));

  const ci = player._seg3ClickIdx;
  const { wStart, wEnd, fromReal, toReal } = seg3ClickAudioWindow(ci);
  player._seg3ClickIdx++;

  const fromFrame = SEG3_START + fromReal - 1;
  const toFrame   = SEG3_START + toReal   - 1;

  seg3Audio.currentTime = wStart;

  if (player._seg3ShenClicks === 0) {
    // Đã bấm đủ 11 lần → phát phần còn lại đến hết
    hideSeg3Shen();
    player.phase = 'seg3rest';
    seg3Audio.play().catch(() => {});
    player._doPlay(SEG3_START, SEG3_END);
    try { parent.postMessage({ action: 'playing' }, '*'); } catch (e) {}
  } else {
    seg3Audio.play().catch(() => {});

    function seg3ShenTick() {
      if (player.phase !== 'seg3shen') return;
      const t = seg3Audio.currentTime;
      if (t >= wEnd || seg3Audio.ended) {
        seg3Audio.pause();
        player._seg3ShenRAF = null;
        if (player.currentFrame !== toFrame) player.drawFrame(toFrame);
        return;
      }
      const span = wEnd - wStart;
      const u = span > 0 ? Math.min(1, Math.max(0, (t - wStart) / span)) : 1;
      const vFrame = Math.round(fromFrame + u * (toFrame - fromFrame));
      if (vFrame !== player.currentFrame) player.drawFrame(vFrame);
      player._seg3ShenRAF = requestAnimationFrame(seg3ShenTick);
    }

    if (player._seg3ShenRAF) cancelAnimationFrame(player._seg3ShenRAF);
    player._seg3ShenRAF = requestAnimationFrame(seg3ShenTick);
  }
}

$seg3ShenBtn.addEventListener('click', seg3ShenOnClick);

  /* ── Message từ parent (React shell) ── */
window.addEventListener('message', (e) => {
  if (e.data?.action === 'pause') {
    if (player.phase.startsWith('seg3')) {
      seg3Audio.pause();
    } else if (player.phase === 'seg2') {
      seg2Audio.pause();
    } else if (player.phase === 'seg1') {
      seg1Audio.pause();
    }
    player.stop();
  }
  if (e.data?.action === 'play') {
    if (player.phase === 'complete') {
      player.restart();
    } else if (player.phase === 'waiting') {
      player.resumeFromCons0();
    } else if (player.phase === 'seg3shen') {
      // User nhấn play trên shell → tự động click con sên giúp họ
      seg3ShenOnClick();
    } else if (!player.isPlaying) {
      if (player.phase === 'seg3intro' || player.phase === 'seg3rest') {
        seg3Audio.play().catch(() => {});
        player._doPlay(player.currentFrame || SEG3_START, SEG3_END);
      } else if (player.phase === 'seg2') {
        seg2Audio.play().catch(() => {});
        player._doPlay(player.currentFrame || RESUME_AT, SEG2_END);
      } else if (player.phase === 'seg1') {
        seg1Audio.play().catch(() => {});
        player._doPlay(player.currentFrame || 1, PAUSE_AT);
      }
    }
  }
  if (e.data?.action === 'restart') player.restart();
  if (e.data?.action === 'goToFrame') player.goToFrame(e.data.frame);
  if (e.data?.action === 'prevFrame') {
    player.goToFrame(Math.max(player.currentFrame - 1, 1));
  }
  if (e.data?.action === 'nextFrame') {
    player.goToFrame(Math.min(player.currentFrame + 1, TOTAL_FRAMES));
  }
});

/* ── Start ── */
player.loadFrames().catch((err) => console.error('session2 loadFrames', err));
</script>
